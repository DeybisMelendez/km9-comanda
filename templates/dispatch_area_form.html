{% extends "layout.html" %}
{% load static %}
{% block title %}{{ title }}{% endblock %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}
{% block body %}
    <div class="main__container">
        <h1>{{ title }}</h1>
        {% include "includes/_messages.html" %}
        <div class="card">
            <div class="card__body">
                <form method="post" class="form">
                    {% csrf_token %}
                    <div class="form__group">
                        <label for="name" class="form__label">Nombre del Área de Despacho *</label>
                        <input type="text"
                               id="name"
                               name="name"
                               value="{% if area %}{{ area.name }}{% endif %}"
                               required
                               class="form__control"
                               placeholder="Ej: Cocina, Bar, Postres">
                    </div>
                    <div class="form__group">
                        <button type="submit" class="button button--primary">💾 Guardar Área</button>
                        <a href="{% url 'dispatch_area_list' %}"
                           class="button button--secondary">↩️ Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
