{% extends "layout.html" %}
{% block title %}{{ title }}{% endblock %}
{% block body %}
    <div class="container">
        <h1 class="mb-4">{{ title }}</h1>
        {% include "includes/_messages.html" %}
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre del Ingrediente *</label>
                        <input type="text"
                               id="name"
                               name="name"
                               value="{% if ingredient %}{{ ingredient.name }}{% endif %}"
                               required
                               class="form-control"
                               placeholder="Ej: Harina de trigo">
                    </div>
                    <div class="mb-3">
                        <label for="unit" class="form-label">Unidad *</label>
                        <select id="unit" name="unit" required class="form-select">
                            <option value="">--- Selecciona una unidad ---</option>
                            {% for unit_code, unit_name in units %}
                                <option value="{{ unit_code }}"
                                        {% if ingredient and ingredient.unit == unit_code %}selected{% endif %}>
                                    {{ unit_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="warehouse" class="form-label">Almacén (opcional)</label>
                        <select id="warehouse" name="warehouse" class="form-select">
                            <option value="">--- Sin almacén ---</option>
                            {% for warehouse in warehouses %}
                                <option value="{{ warehouse.id }}"
                                        {% if ingredient and ingredient.warehouse.id == warehouse.id %}selected{% endif %}>
                                    {{ warehouse.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary"><i class="material-icons">save</i> Guardar Ingrediente</button>
                        <a href="{% url 'ingredient_list' %}" class="btn btn-secondary"><i class="material-icons">arrow_back</i> Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
