{% extends "layout.html" %}
{% block title %}{{ title }}{% endblock %}
{% block body %}
    <div class="container">
        <h1 class="mb-4">{{ title }}</h1>
        {% include "includes/_messages.html" %}
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre del Área de Despacho *</label>
                        <input type="text"
                               id="name"
                               name="name"
                               value="{% if area %}{{ area.name }}{% endif %}"
                               required
                               class="form-control"
                               placeholder="Ej: Cocina, Bar, Postres">
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary"><i class="material-icons">save</i> Guardar Área</button>
                        <a href="{% url 'dispatch_area_list' %}"
                           class="btn btn-secondary"><i class="material-icons">arrow_back</i> Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
