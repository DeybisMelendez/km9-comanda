{% extends "layout.html" %}
{% block title %}{{ title }}{% endblock %}
{% block body %}
    <div class="container">
        <h1 class="mb-4">{{ title }}</h1>
        {% include "includes/_messages.html" %}
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre del Producto *</label>
                        <input type="text"
                               id="name"
                               name="name"
                               value="{% if product %}{{ product.name }}{% endif %}"
                               required
                               class="form-control"
                               placeholder="Ej: Pizza Margarita">
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Categoría</label>
                        <select id="category" name="category" class="form-select">
                            <option value="">--- Sin categoría ---</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}"
                                        {% if product and product.category.id == cat.id %}selected{% endif %}>
                                    {{ cat.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="dispatch_area" class="form-label">Área de Despacho</label>
                        <select id="dispatch_area" name="dispatch_area" class="form-select">
                            <option value="">--- Sin área ---</option>
                            {% for area in dispatch_areas %}
                                <option value="{{ area.id }}"
                                        {% if product and product.dispatch_area.id == area.id %}selected{% endif %}>
                                    {{ area.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Precio (C$) *</label>
                        <input type="number"
                               id="price"
                               name="price"
                               step="0.01"
                               min="0"
                               value="{% if product %}{{ product.price|floatformat:2 }}{% else %}0.00{% endif %}"
                               required
                               class="form-control"
                               placeholder="0.00">
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary"><i class="material-icons">save</i> Guardar Producto</button>
                        <a href="{% url 'product_list' %}" class="btn btn-secondary"><i class="material-icons">arrow_back</i> Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
