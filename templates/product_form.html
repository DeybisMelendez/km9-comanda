{% extends "layout.html" %}
{% load static %}
{% block title %}{{ title }}{% endblock %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}
{% block body %}
    <div class="main__container">
        <h1>{{ title }}</h1>
        {% include "includes/_messages.html" %}
        <div class="card">
            <div class="card__body">
                <form method="post" class="form">
                    {% csrf_token %}
                    <div class="form__group">
                        <label for="name" class="form__label">Nombre del Producto *</label>
                        <input type="text"
                               id="name"
                               name="name"
                               value="{% if product %}{{ product.name }}{% endif %}"
                               required
                               class="form__control"
                               placeholder="Ej: Pizza Margarita">
                    </div>
                    <div class="form__group">
                        <label for="category" class="form__label">Categoría</label>
                        <select id="category" name="category" class="form__control">
                            <option value="">--- Sin categoría ---</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}"
                                        {% if product and product.category.id == cat.id %}selected{% endif %}>
                                    {{ cat.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form__group">
                        <label for="dispatch_area" class="form__label">Área de Despacho</label>
                        <select id="dispatch_area" name="dispatch_area" class="form__control">
                            <option value="">--- Sin área ---</option>
                            {% for area in dispatch_areas %}
                                <option value="{{ area.id }}"
                                        {% if product and product.dispatch_area.id == area.id %}selected{% endif %}>
                                    {{ area.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form__group">
                        <label for="price" class="form__label">Precio (C$) *</label>
                        <input type="number"
                               id="price"
                               name="price"
                               step="0.01"
                               min="0"
                               value="{% if product %}{{ product.price|floatformat:2 }}{% else %}0.00{% endif %}"
                               required
                               class="form__control"
                               placeholder="0.00">
                    </div>
                    <div class="form__group">
                        <button type="submit" class="button button--primary">💾 Guardar Producto</button>
                        <a href="{% url 'product_list' %}" class="button button--secondary">↩️ Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
